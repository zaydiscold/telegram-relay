routes:
  - name: robs-thoughts
    from: "@robthinks"          # @username or numeric chat id
    to: [discord_robs]          # fan-out: list more webhook names
    # Optional. Left-bar color of the Discord embed, as a quoted "#RRGGBB" hex
    # string (YAML treats an unquoted # as a comment, so the quotes matter).
    # Defaults to a neon Telegram blue (#29B6F6) when omitted. A malformed hex
    # value fails startup, naming this route.
    # color: "#29B6F6"
    # filter:
    #   any_keywords: ["entry", "alert"]
    #   exclude_hashtags: ["#ad"]

webhooks:
  discord_robs: { env: DISCORD_WEBHOOK_ROBS }

ops_webhook: { env: DISCORD_WEBHOOK_OPS }   # optional: startup/error notices

media:
  mode: reupload            # reupload | placeholder
  max_bytes: 10000000

# Optional. Posts are relayed as live-updating Discord embeds; the refresh
# worker re-checks each post and PATCHes changes. Two cadences run at once:
#   * edits + deletes  — checked every `interval_mins` for the full
#     `horizon_hours` (the most pertinent changes).
#   * reactions + comments — QoL only, so checked a few times early
#     (at ~`reaction_early_check_secs`, then at `interval_mins`, then at
#     `reaction_horizon_mins`) and then frozen once a post ages past
#     `reaction_horizon_mins`. This keeps Telegram request volume low.
# Defaults shown.
refresh:
  interval_mins: 30              # edit/delete re-check cadence
  horizon_hours: 48             # stop updating (and prune) posts older than this
  reaction_horizon_mins: 60     # stop updating reactions/comments after this
  reaction_early_check_secs: 60 # the early "+1 min" reaction burst check

# Optional. SQLite file tracking relayed posts so embeds can be updated in
# place across restarts. Defaults to relay.db in the working directory.
store:
  path: relay.db
